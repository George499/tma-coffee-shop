# Render Blueprint — single API web service that hosts both REST endpoints and
# the Telegram webhook receiver. Web is deployed on Vercel separately.
#
# After importing this Blueprint in the Render dashboard, set the secret env
# vars (DATABASE_URL, TELEGRAM_BOT_TOKEN, ADMIN_CHAT_ID, BOT_API_SECRET,
# TELEGRAM_WEBHOOK_SECRET) and redeploy. The TELEGRAM_WEBHOOK_URL value below
# uses Render's RENDER_EXTERNAL_URL substitution so the webhook self-registers
# on first boot.

services:
  - type: web
    name: tma-coffee-shop-api
    runtime: docker
    rootDir: .
    dockerfilePath: ./apps/api/Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /api/categories
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: WEB_ORIGIN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        # Render exposes the public URL via RENDER_EXTERNAL_URL.
        generateValue: false
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: BOT_API_SECRET
        generateValue: true
